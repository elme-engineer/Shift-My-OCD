name: shiftmyocd
description: "App to help people with OCD remembering their daily tasks."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  # AI
  http: ^1.2.0

  # Firebase
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4
  firebase_auth: ^5.3.1

  # Hardware input
  nfc_manager: ^3.5.0
  mobile_scanner: ^5.2.3
  vibration: ^2.0.0

  # Visualization & export
  fl_chart: ^0.69.0
  pdf: ^3.11.1
  printing: ^5.13.4
  csv: ^6.0.0

  # Utilities
  intl: ^0.19.0
  path_provider: ^2.1.4
  share_plus: ^10.0.2
  uuid: ^4.5.0
  provider: ^6.1.2
  qr_flutter: ^4.1.0
  barcode: ^2.2.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
